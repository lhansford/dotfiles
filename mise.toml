[tasks."format:nix"]
description = "Format Nix files"
run = "nix develop --command nixfmt home-manager/*.nix"

[tasks."format:sh"]
description = "Format shell scripts"
run = "nix develop --command shfmt -w scripts/"

[tasks.format]
description = "Format all files"
depends = ["format:nix", "format:sh"]

[tasks."lint:nix"]
description = "Lint Nix files with statix"
run = "nix develop --command statix check home-manager/"

[tasks."lint:sh"]
description = "Lint shell scripts with shellcheck"
run = "nix develop --command bash -c 'grep -rl \"^#!/usr/bin/env bash\" scripts/ | xargs shellcheck'"

[tasks.lint]
description = "Lint all files"
depends = ["lint:nix", "lint:sh"]

[tasks."lint:fix"]
description = "Auto-fix Nix lint issues"
run = "nix develop --command statix fix home-manager/"
